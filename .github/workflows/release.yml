name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: v
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Managed NAS Card ${{ steps.v.outputs.VERSION }}"
          body: |
            ## Managed NAS Card ${{ steps.v.outputs.VERSION }}

            ### Installazione via HACS
            Aggiorna direttamente da HACS → Frontend.

            ### Installazione manuale
            Scarica i file JS e copiali in `config/www/`:
            - `managed-nas-card.js`
            - `managed-nas-detail-card.js`

            Poi aggiungili come risorse Lovelace:
            ```
            /local/managed-nas-card.js
            /local/managed-nas-detail-card.js
            ```

            Vedi il [README](https://github.com/${{ github.repository }}#readme).
          files: |
            dist/managed-nas-card.js
            dist/managed-nas-detail-card.js
