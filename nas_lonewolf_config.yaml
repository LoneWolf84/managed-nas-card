# ─────────────────────────────────────────────────────────────────────────────
#  YAML PRONTO ALL'USO — NAS LONEWOLF
#  Generato analizzando i tuoi sensori reali
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. input_select (configuration.yaml o input_select.yaml) ─────────────────
input_select:
  nas_selected_bay:
    name: "Selettore Bay NAS"
    options:
      - Nessuna
      - Baia 1
      - Baia 2
      - Baia 3
      - Baia 4
      - Baia 5
      - Baia 6
      - Baia 7
      - Baia 8
      - Status
      - Alert
      - USB
    icon: mdi:nas

# ─────────────────────────────────────────────────────────────────────────────
#  CARD PRINCIPALE — managed-nas-card
# ─────────────────────────────────────────────────────────────────────────────
# Incolla questa card nella tua dashboard Lovelace

type: custom:managed-nas-card

# Header
title: NAS
model: RS1221+

# Bay
bays: 8
grid_cols: auto          # 4 colonne × 2 righe (come originale)
bay_label: BAY

# Entità — obbligatorie
sensor_base: sensor.nas_lonewolf
binary_base: binary_sensor.nas_lonewolf

# Input select
input_select: input_select.nas_selected_bay
bay_option_prefix: "Baia "
input_select_none: Nessuna

# Pulsanti
reboot_button:   button.nas_lonewolf_reboot
shutdown_button: button.nas_lonewolf_shutdown

# USB — prefisso comune a tutte le entità USB
usb_prefix: sensor.nas_lonewolf_usb_disk

# ── Suffissi entità bay (TUTTI corrispondono ai tuoi sensori reali) ───────────
suffix_smart:       _drive_{N}_stato_intelligente
suffix_bad_sectors: _drive_{N}_superato_il_numero_massimo_di_settori_danneggiati
suffix_low_life:    _drive_{N}_al_di_sotto_della_vita_residua_minima
suffix_temp:        _temperatura
suffix_uptime:      _ultimo_avvio
suffix_safety:      _stato_di_sicurezza

# Valori SMART considerati OK
smart_ok:
  - normal
  - Ottimo

# Funzionalità
show_reboot:   true
show_shutdown: true
show_usb:      true
show_status:   true
show_alert:    true
show_temp:     true
show_uptime:   true

# ─────────────────────────────────────────────────────────────────────────────
#  COMPANION CARD — managed-nas-detail-card
# ─────────────────────────────────────────────────────────────────────────────
# Metti questa card subito DOPO la managed-nas-card nella dashboard.
# Scompare automaticamente quando niente è selezionato.

type: custom:managed-nas-detail-card

# Collegamento con la card principale
input_select:      input_select.nas_selected_bay
bay_option_prefix: "Baia "
input_select_none: Nessuna
sensor_base:       sensor.nas_lonewolf
binary_base:       binary_sensor.nas_lonewolf
bays: 8

# ── Suffissi BAY ─────────────────────────────────────────────────────────────
# Temperatura disco per bay
suffix_temp:        _drive_{N}_temperatura

# Volume — i tuoi sensori usano "spazio_utilizzato" (non "spazio_usato")
suffix_vol_used:    _volume_{N}_spazio_utilizzato
suffix_vol_free:    ""                              # non esiste → calcolato automaticamente
suffix_vol_total:   _volume_{N}_dimensione_totale  # usato per calcolare il libero
suffix_vol_pct:     _volume_{N}_volume_utilizzato   # percentuale usata per il donut
suffix_vol_state:   _volume_{N}_stato

# Alert binary per bay
suffix_bad_sectors: _drive_{N}_superato_il_numero_massimo_di_settori_danneggiati
suffix_low_life:    _drive_{N}_al_di_sotto_della_vita_residua_minima

# ── Suffissi STATUS ───────────────────────────────────────────────────────────
suffix_ram_pct:    _utilizzo_della_memoria_reale
suffix_ram_free:   _memoria_disponibile_reale

# SWAP — non hai "swap_in_uso", viene calcolato da totale-disponibile
suffix_swap_used:  ""                              # non esiste → calcolato automaticamente
suffix_swap_total: _memoria_totale_scambio         # usato per calcolare swap usato
suffix_swap_free:  _memoria_disponibile_scambio

suffix_cpu_total:  _utilizzo_della_cpu_totale
suffix_cpu_sys:    _utilizzo_della_cpu_sistema
suffix_cpu_user:   _utilizzo_della_cpu_utente
suffix_cpu_other:  _utilizzo_della_cpu_altro

suffix_load_1:     _carico_medio_della_cpu_1_min
suffix_load_5:     _carico_medio_della_cpu_5_min
suffix_load_15:    _carico_medio_della_cpu_15_min

suffix_cache:      _memoria_in_cache

suffix_net_up:     _velocita_di_caricamento
suffix_net_down:   _velocita_di_scaricamento

# Grafico storico
history_hours:   1
graph_update_ms: 5000

# ─────────────────────────────────────────────────────────────────────────────
#  NOTE
# ─────────────────────────────────────────────────────────────────────────────
#
# VOLUMI:
#   Hai volume_1..7 (7 volumi) su 8 bay fisiche.
#   Il click su Baia 1 mostra il Volume 1, Bay 2 → Volume 2, ecc.
#   Se una bay non ha volume corrispondente (es. Bay 8) lo stato apparirà "--".
#
# SPAZIO LIBERO VOLUME:
#   Non hai un sensore dedicato per lo spazio libero.
#   La card lo calcola automaticamente: libero = dimensione_totale - spazio_utilizzato
#
# SWAP USATO:
#   Non hai un sensore dedicato per la swap in uso.
#   La card la calcola automaticamente: swap_usato = memoria_totale_scambio - memoria_disponibile_scambio
#
# BAY 7 (drive_7):
#   Non compare nella tua lista sensori — probabilmente slot vuoto.
#   Il LED apparirà spento (grigio) senza errori.
#
# RISORSE LOVELACE (installazione manuale):
#   /local/managed-nas-card.js        → JavaScript Module
#   /local/managed-nas-detail-card.js → JavaScript Module
#
# RISORSE LOVELACE (via HACS):
#   /hacsfiles/managed-nas-card/managed-nas-card.js        → JavaScript Module
#   /hacsfiles/managed-nas-card/managed-nas-detail-card.js → JavaScript Module
